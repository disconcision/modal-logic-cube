<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Modal Logic Cube — Hasse diagram of K … S5</title>
  <link rel="icon" href="data:," />
  <style>
    :root {
      --bg0: #0d1117; --bg1: #161b22; --panel: rgba(22,27,34,0.86);
      --line: #30363d; --txt: #e6edf3; --dim: #9aa4b2; --accent: #58a6ff;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; overflow: hidden;
      background: radial-gradient(1200px 800px at 70% 10%, #11161f 0%, var(--bg0) 60%);
      color: var(--txt); font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      -webkit-user-select: none; user-select: none; touch-action: none; }
    #app { position: fixed; inset: 0; }
    #labels { position: fixed; inset: 0; pointer-events: none; overflow: hidden; }

    /* node labels */
    .node-label { font-weight: 700; font-size: 13.5px; letter-spacing: .2px;
      color: #eef3f8; white-space: nowrap; padding: 1px 6px; border-radius: 7px;
      background: rgba(13,17,23,.72); border: 1px solid rgba(255,255,255,.10);
      box-shadow: 0 1px 4px rgba(0,0,0,.5); transform: translate(11px, -3px); }
    .node-label.base { color: #ffd166; background: rgba(74,53,0,.6); border-color: rgba(255,209,102,.4); }

    /* control panel */
    #panel { position: fixed; top: 14px; left: 14px; width: 314px; max-height: calc(100% - 28px);
      overflow: auto; padding: 14px 16px 16px; border: 1px solid var(--line); border-radius: 14px;
      background: var(--panel); backdrop-filter: blur(9px); -webkit-backdrop-filter: blur(9px);
      box-shadow: 0 12px 40px rgba(0,0,0,.45); }
    #panel h1 { margin: 0 0 2px; font-size: 16px; font-weight: 700; }
    #panel .sub { margin: 0 0 12px; color: var(--dim); font-size: 12px; }
    .base-row { display: flex; align-items: center; gap: 8px; padding: 8px 10px; margin-bottom: 10px;
      border: 1px dashed var(--line); border-radius: 10px; background: rgba(255,209,102,.06); }
    .base-row .tag { font-weight: 800; color: #ffd166; }
    .base-row .f { color: var(--dim); font-size: 12px; font-family: ui-monospace, "SF Mono", Menlo, monospace; }

    .axiom { display: flex; align-items: center; gap: 9px; padding: 7px 8px; border-radius: 10px;
      cursor: pointer; transition: background .12s; }
    .axiom:hover { background: rgba(255,255,255,.04); }
    .axiom input { width: 17px; height: 17px; accent-color: var(--accent); cursor: pointer; margin: 0; }
    .axiom .sw { width: 13px; height: 13px; border-radius: 3px; flex: 0 0 auto; box-shadow: 0 0 0 1px rgba(0,0,0,.4) inset; }
    .axiom .tag { font-weight: 800; width: 16px; text-align: center; }
    .axiom .meta { display: flex; flex-direction: column; line-height: 1.25; }
    .axiom .meta .f { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12.5px; }
    .axiom .meta .n { color: var(--dim); font-size: 11px; }

    .btns { display: flex; gap: 8px; margin-top: 12px; }
    .btns button { flex: 1; padding: 7px 0; border: 1px solid var(--line); border-radius: 9px;
      background: #1f2630; color: var(--txt); font-size: 12.5px; cursor: pointer; }
    .btns button:hover { background: #283242; border-color: #3d4756; }

    .count { margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--line);
      color: var(--dim); font-size: 12px; }
    .count b { color: var(--txt); }
    .hint { margin-top: 8px; color: var(--dim); font-size: 11.5px; }
    .hint kbd { font: 11px ui-monospace, monospace; background: #1f2630; border: 1px solid var(--line);
      border-radius: 4px; padding: 1px 5px; }

    /* hovered-node read-out */
    #readout { position: fixed; right: 14px; bottom: 14px; min-width: 150px; padding: 10px 13px;
      border: 1px solid var(--line); border-radius: 12px; background: var(--panel);
      backdrop-filter: blur(9px); -webkit-backdrop-filter: blur(9px); font-size: 12.5px;
      opacity: 0; transition: opacity .15s; pointer-events: none; }
    #readout.on { opacity: 1; }
    #readout .nm { font-weight: 800; font-size: 15px; margin-bottom: 2px; }
    #readout .pr { color: var(--dim); }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="labels"></div>

  <div id="panel">
    <h1>Modal&nbsp;Logic&nbsp;Cube</h1>
    <p class="sub">Hasse diagram of normal modal logics, K&nbsp;→&nbsp;S5</p>
    <div class="base-row">
      <span class="tag">K</span>
      <span class="f" id="k-formula"></span>
    </div>
    <div id="axioms"></div>
    <div class="btns">
      <button id="btn-all">All axioms</button>
      <button id="btn-none">Reset to K</button>
    </div>
    <div class="count">Showing <b id="n-logics">1</b> logics, <b id="n-edges">0</b> edges</div>
    <div class="hint">
      <b>Camera:</b> drag&nbsp;=&nbsp;orbit · scroll/pinch&nbsp;=&nbsp;zoom · right-drag / two-finger&nbsp;=&nbsp;pan.
    </div>
  </div>

  <div id="readout">
    <div class="nm"></div>
    <div class="pr"></div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "./vendor/three.module.js",
      "three/addons/": "./vendor/addons/"
    }
  }
  </script>
  <script type="module" src="./main.js"></script>
</body>
</html>
